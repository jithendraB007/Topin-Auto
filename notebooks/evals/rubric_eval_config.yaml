      meets her deadlines", "She does not believe deadlines are important", "Her reports
      are never required"], "correct_answer": "Her behaviour conflicts with her stated
      principle", "explanation": "Correct answer: Her behaviour conflicts with her
      stated principle\n\nExplanation: The sentence contrasts what she says with what
      she does.\n\nExplanation of each option:\nHer behaviour conflicts with her stated
      principle is correct because her actions do not match her claim.\nShe always
      meets her deadlines is incorrect because she submits reports late.\nShe does
      not believe deadlines are important is incorrect because she says they matter.\nHer
      reports are never required is incorrect because submission is clearly expected.",
      "target_cefr": "C1", "target_difficulty": "Hard", "language_variant": "British
      English"}]'
  assert:
  - type: javascript
    value: 'const results = JSON.parse(output); const p = Array.isArray(results) ?
      results[0] : results; return p.overall_decision === "Pass";'
