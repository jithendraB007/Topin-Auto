description: RubricJudge eval — overall_decision per question
providers:
- id: file://rubric_eval_provider.py
prompts:
- '{{question_json}}'
tests:
- description: Q1 | cefr=A1 expect=Pass
  vars:
    question_json: '[{"question_id": "Q1", "stem": "Read the sentence carefully and
      answer the question.\n\nThe girl is reading beside the window.\n\nWhere is the
      girl reading?", "options": ["Beside the window", "In the garden", "Near the
      staircase", "Under the table"], "correct_answer": "Beside the window", "explanation":
      "Correct answer: Beside the window\n\nExplanation: The sentence clearly states
      where the girl is reading.\n\nExplanation of each option:\nBeside the window
      is correct because it directly matches the statement.\nIn the garden is incorrect
      because no outdoor location is mentioned.\nNear the staircase is incorrect because
      that place is not referred to.\nUnder the table is incorrect because the sentence
      says she is beside the window.", "target_cefr": "A1", "target_difficulty": "Easy",
      "language_variant": "British English"}]'
  assert:
  - type: javascript
    value: 'const results = JSON.parse(output); const p = Array.isArray(results) ?
      results[0] : results; return p.overall_decision === "Pass";'
- description: Q2 | cefr=A2 expect=Pass
  vars:
    question_json: '[{"question_id": "Q2", "stem": "Choose the option that is NOT
      true according to the statement.\n\nThe help desk does not answer calls after
      8 p.m.\n\nWhich option is NOT true?", "options": ["The help desk stops answering
      after 8 p.m.", "Calls are not answered after 8 p.m.", "The help desk answers
      calls at 9 p.m.", "The help desk is unavailable after 8 p.m."], "correct_answer":
      "The help desk answers calls at 9 p.m.", "explanation": "Correct answer: The
      help desk answers calls at 9 p.m.\n\nExplanation: The statement says calls are
      not answered after 8 p.m., so answering at 9 p.m. is not possible.\n\nExplanation
      of each option:\nThe help desk stops answering after 8 p.m. is incorrect because
      it matches the statement.\nCalls are not answered after 8 p.m. is incorrect
      because it repeats the same meaning.\nThe help desk answers calls at 9 p.m.
      is correct because it contradicts the statement.\nThe help desk is unavailable
      after 8 p.m. is incorrect because it is consistent with the information given.",
      "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British
      English"}]'
  assert:
  - type: javascript
    value: 'const results = JSON.parse(output); const p = Array.isArray(results) ?
      results[0] : results; return p.overall_decision === "Pass";'
- description: Q3 | cefr=B1 expect=Pass
  vars:
    question_json: '[{"question_id": "Q3", "stem": "Read the statement and identify
      the reason.\n\nLeena carried a torch because the corridor lights had failed.\n\nWhy
      did Leena carry a torch?", "options": ["The corridor lights had failed", "She
      was looking for her keys", "She wanted to go camping", "The torch was new"],
      "correct_answer": "The corridor lights had failed", "explanation": "Correct
      answer: The corridor lights had failed\n\nExplanation: The sentence directly
      provides the reason for carrying the torch.\n\nExplanation of each option:\nThe
      corridor lights had failed is correct because it clearly explains the action.\nShe
      was looking for her keys is incorrect because keys are not mentioned.\nShe wanted
      to go camping is incorrect because the context is a corridor, not a trip.\nThe
      torch was new is incorrect because novelty is not given as a reason.", "target_cefr":
      "B1", "target_difficulty": "Medium", "language_variant": "British English"}]'
  assert:
  - type: javascript
    value: 'const results = JSON.parse(output); const p = Array.isArray(results) ?
      results[0] : results; return p.overall_decision === "Pass";'
- description: Q4 | cefr=B2 expect=Pass
  vars:
    question_json: '[{"question_id": "Q4", "stem": "What can be inferred from the
      statement?\n\nAlthough the train was delayed, the team still reached the stadium
      before the match began.", "options": ["The team adjusted well to the delay",
      "The match had already ended", "The stadium was closed", "The train arrived
      early"], "correct_answer": "The team adjusted well to the delay", "explanation":
      "Correct answer: The team adjusted well to the delay\n\nExplanation: The sentence
      shows that despite the delay, the team still arrived in time, which suggests
      effective adjustment.\n\nExplanation of each option:\nThe team adjusted well
      to the delay is correct because they overcame the problem successfully.\nThe
      match had already ended is incorrect because they arrived before it began.\nThe
      stadium was closed is incorrect because that information is not given.\nThe
      train arrived early is incorrect because the train was delayed.", "target_cefr":
      "B2", "target_difficulty": "Medium", "language_variant": "British English"}]'
  assert:
  - type: javascript
    value: 'const results = JSON.parse(output); const p = Array.isArray(results) ?
      results[0] : results; return p.overall_decision === "Pass";'
