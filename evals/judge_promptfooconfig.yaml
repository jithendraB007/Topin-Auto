  - description: "Q19 [GOOD] Grammar error correction parallel structure - B2 Medium"
    vars:
      question_json: |-
        {"stem": "The speaker was convincing because she not only presented clear evidence but also she explained the implications. Which option corrects the underlined part?", "options": ["she not only presented clear evidence but also she explained the implications", "she not only presented clear evidence but also explained the implications", "she not only presented clear evidence but also explaining the implications", "she not only presented clear evidence but also an explanation of the implications"], "correct_answer": "she not only presented clear evidence but also explained the implications", "explanation": "Removing the second 'she' creates a parallel structure: not only presented but also explained. Both verbs are now in the same form.", "target_cefr": "B2", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 19, "topic": "Grammar - Error Correction"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision === "Pass";

  - description: "Q20 [GOOD] Conversation projector - B1 Medium"
    vars:
      question_json: |-
        {"stem": "Person A: Why is the meeting starting late today? Person B: ____________", "options": ["The projector was damaged during setup.", "The projector has damage during setup.", "The projector got damaged during setup.", "The projector was got damaged during setup."], "correct_answer": "The projector got damaged during setup.", "explanation": "Got damaged is natural and conversational. Was got damaged is grammatically incorrect. Has damage uses the wrong verb form.", "target_cefr": "B1", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 20, "topic": "Conversation Completion"}
    assert:
