  # ─────────────────────────────────────────────────────────────
  # FLAWED QUESTIONS — expect overall_decision: Revise or Fail
  # ─────────────────────────────────────────────────────────────

  - description: "Q9 [FLAWED] Priya passage - only 3 options - A2 Easy"
    vars:
      question_json: |-
        {"stem": "Passage: Priya began setting her alarm 20 minutes earlier each morning. This gave her enough time to eat breakfast calmly and catch the bus without rushing, so she arrived at college on time. Why did Priya set her alarm earlier?", "options": ["She wanted to study late at night.", "She wanted to have a calm morning and reach college on time.", "She wanted to take a longer bus route."], "correct_answer": "She wanted to have a calm morning and reach college on time.", "explanation": "Priya set her alarm earlier so she could eat breakfast calmly, catch the bus without rushing, and arrive at college on time.", "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British English", "question_number": 9, "topic": "Reading Comprehension"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should identify that this MCQ has only 3 options
          instead of the required 4. A well-formed MCQ must have exactly 4 options.
          The evaluation should flag this as a formatting or structural issue.

  - description: "Q11 [FLAWED] Either-or panel - marked answer contradicts explanation - B2 Medium"
    vars:
      question_json: |-
        {"stem": "The panel will either ______ the candidate today or ______ a follow-up interview next week.", "options": ["approve, schedulng", "approving, schedulng", "approve, schedule", "approving, schedule"], "correct_answer": "approving, schedule", "explanation": "Approve and schedule are both base verbs, so they correctly match the either...or structure. Approving, schedule is incorrect because the two verb forms are not parallel.", "target_cefr": "B2", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 11, "topic": "Grammar - Parallel Structure"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should detect that the marked correct answer
          "approving, schedule" directly contradicts the explanation, which
          explicitly states that "approving, schedule is incorrect because the
          two verb forms are not parallel." The explanation supports "approve,
          schedule" as correct, not the marked answer.

  - description: "Q13 [FLAWED] Vocabulary unanimous - only 3 options - B2 Medium"
    vars:
      question_json: |-
        {"stem": "The committee's decision was unanimous, leaving no room for disagreement. Which phrase is most similar in meaning?", "options": ["made after a long debate", "agreed on by everyone", "announced without explanation"], "correct_answer": "agreed on by everyone", "explanation": "Unanimous means all people were in agreement.", "target_cefr": "B2", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 13, "topic": "Vocabulary"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should identify that this MCQ has only 3 options
          instead of the required 4. A standard MCQ must include exactly 4 options
          to be considered well-formed.

  - description: "Q14 [FLAWED] Maria park - explanation is for Olivia/village question - A2 Easy"
    vars:
      question_json: |-
        {"stem": "TEXT: My name is Maria, and I love spending time in the park near my house. Every morning, I go there for a walk before school. On weekends, I take my dog, Max, and we play together. The park is my favourite place because it is quiet and full of trees. Question: Where does Maria go with her dog on weekends?", "options": ["She sleeps at home.", "She meets her teacher.", "She goes to the park with her dog", "She studies at the park"], "correct_answer": "She goes to the park with her dog", "explanation": "Correct answer: She feels settled and happy. The correct answer is She feels settled and happy because it shows that Olivia now feels comfortable in village life and has adapted to it well.", "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British English", "question_number": 14, "topic": "Reading Comprehension"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should detect that the explanation describes
          a completely different question about Olivia and village life, while
          the stem asks about Maria and the park. The explanation does not
          match the question stem at all. This is a critical explanation-answer
          mismatch and should result in a Fail or Revise decision.

  - description: "Q15 [FLAWED] Olivia village - explanation is for Maria/park question - A2 Easy"
    vars:
      question_json: |-
        {"stem": "How does Olivia feel about living in the village now?", "options": ["She feels settled and happy", "She wants to return to the city", "She is still unsure about village life", "She misses the busy streets"], "correct_answer": "She feels settled and happy", "explanation": "Correct answer: She goes to the park with her dog. In the text, Maria says: On weekends, I take my dog, Max, and we play together. This means she goes to the park with her dog on weekends.", "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British English", "question_number": 15, "topic": "Reading Comprehension"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should detect that the explanation discusses
          Maria and a park, while the stem asks about Olivia and village life.
          The explanation mentions a dog and a park, which have nothing to do
          with the question. This is a critical mismatch and should Fail.

  - description: "Q16 [FLAWED] Mountain trip text completion - correct answer not in options - B1 Medium"
    vars:
      question_json: |-
        {"stem": "Last weekend, our class went on a trip to the mountains. We left early in the morning and arrived just _____ noon. The weather was perfect, so we decided to climb one of the smaller hills. _____ reaching the top, we sat down to have lunch and enjoy the view.", "options": ["ahead, at", "On, around", "after, By", "before, after"], "correct_answer": "around, after", "explanation": "Around noon means close to noon. After reaching the top is correct because lunch happened after reaching the top.", "target_cefr": "B1", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 16, "topic": "Text Completion"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should detect that the marked correct answer
          "around, after" does not appear as any of the four listed options
          (ahead/at, On/around, after/By, before/after). A correct answer
          that is not present in the options list is a fundamental MCQ
          construction flaw and must not pass.

  - description: "Q17 [FLAWED] Ethan English practice - wrong correct answer - A2 Easy"
    vars:
      question_json: |-
        {"stem": "TEXT: Ethan wants to meet new people and practise English in an informal way. Which event is best for Ethan?", "options": ["Cooking Class - Learn recipes from around the world.", "Music Night - Listen to live bands every Friday.", "Conversation Cafe - Chat in English with friendly locals.", "Film Club - Watch classic movies together."], "correct_answer": "Film Club - Watch classic movies together.", "explanation": "Film Club is treated as correct here although the text says Ethan wants to meet people and practise English informally. Conversation Cafe would seem more suitable from the text, but it is not the marked answer.", "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British English", "question_number": 17, "topic": "Matching Task"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should detect that the marked correct answer
          "Film Club" does not match the task description. Ethan wants to meet
          people and practise English informally, which clearly aligns with
          "Conversation Cafe - Chat in English with friendly locals." The
          explanation itself admits Film Club is not the most suitable choice.
          This is a functionality alignment failure.

  - description: "Q18 [FLAWED] Olivia teamwork - option is not a programme - A2 Easy"
    vars:
      question_json: |-
        {"stem": "TEXT: Olivia hopes to gain teamwork experience for her future career and prefers something active. Which programme is best for Olivia?", "options": ["Music Course - Learn piano individually.", "The seminar starts later than planned.", "Cooking Class - Learn recipes from around the world.", "Music Night - Listen to live bands every Friday."], "correct_answer": "The seminar starts later than planned.", "explanation": "The marked answer is The seminar starts later than planned. However, this is not a programme choice at all. It is an unrelated statement. The explanation itself acknowledges this mismatch.", "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British English", "question_number": 18, "topic": "Matching Task"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision !== "Pass";
      - type: llm-rubric
        value: >-
          The rubric evaluation should detect multiple flaws: (1) one of the
          options "The seminar starts later than planned" is not a programme
          choice and is completely unrelated to the other options, (2) the
          marked correct answer is this non-programme option, and (3) none of
          the actual programme options clearly match Olivia's need for
          teamwork and active experience. This is a fundamental item
          construction failure.
