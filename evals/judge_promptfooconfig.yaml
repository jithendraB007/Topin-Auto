        {"stem": "Lalita told me to make new arrangements after the hall booking got cancelled. Which option correctly rewrites this in passive voice?", "options": ["I was told to make new arrangements by Lalita after the hall booking got cancelled.", "I was told to make new arrangements by Lalita after they cancelled the booking.", "New arrangements were to be made by me after the hall booking was cancelled.", "I have been told to make new arrangements by Lalita after they cancelled the booking."], "correct_answer": "New arrangements were to be made by me after the hall booking was cancelled.", "explanation": "This converts the instruction to passive and correctly preserves the meaning of the cancellation event.", "target_cefr": "B2", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 23, "topic": "Grammar - Passive Voice"}
