        {"stem": "Person A: Why is Rahul absent today? Person B: ____________", "options": ["He was injured while playing football yesterday.", "He got injured while playing football yesterday.", "He has get injured while playing football yesterday.", "He was got injured while playing football yesterday."], "correct_answer": "He was injured while playing football yesterday.", "explanation": "He was injured is grammatically correct and standard in formal English. He has get injured uses incorrect grammar.", "target_cefr": "B1", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 21, "topic": "Conversation Completion"}
    assert:
