description: MCQ individual question judge evals (good vs flawed)

providers:
  - file://judge_provider.py

prompts:
  - "{{question_json}}"

# ─────────────────────────────────────────────
# GOOD QUESTIONS — expect overall_decision: Pass
# ─────────────────────────────────────────────
tests:
  - description: "Q1 [GOOD] Farida inference - B1 Medium"
    vars:
      question_json: |-
        {"stem": "Farida packed a light sweater before leaving for the museum trip. What does this suggest about Farida?", "options": ["She expected the weather or indoor temperature to be cool.", "She planned to buy clothes during the trip.", "She had forgotten where the museum was.", "She wanted to lend the sweater to the guide."], "correct_answer": "She expected the weather or indoor temperature to be cool.", "explanation": "Packing a light sweater suggests she was preparing for cool conditions, either outside or inside the museum.", "target_cefr": "B1", "target_difficulty": "Medium", "language_variant": "British English", "question_number": 1, "topic": "Inference"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision === "Pass";

  - description: "Q2 [GOOD] Health camp factual - A2 Easy"
    vars:
      question_json: |-
        {"stem": "The health camp starts at 10 a.m. on the ground floor. Which statement is correct?", "options": ["It starts at night on the ground floor", "It starts in the evening on the ground floor", "It starts in the morning on the ground floor", "It is cancelled"], "correct_answer": "It starts in the morning on the ground floor", "explanation": "10 a.m. is in the morning, so the correct statement is that the camp starts in the morning on the ground floor.", "target_cefr": "A2", "target_difficulty": "Easy", "language_variant": "British English", "question_number": 2, "topic": "Factual Comprehension"}
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output);
          return r.rubric.overall_decision === "Pass";

